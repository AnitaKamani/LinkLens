<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkLens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #666;
      --green: #00c853;
      --red: #ff1744;
      --accent: #4fc3f7;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Inter', sans-serif;
    }

    body {
      width: 340px;
      min-height: 200px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
    }

    /* ── Views ── */
    .view { display: none; flex-direction: column; }
    .view.active { display: flex; }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .logo span { color: var(--accent); }
    .settings-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 4px;
      border-radius: 4px;
      line-height: 0;
      transition: color 0.15s;
    }
    .settings-btn:hover { color: var(--text); }

    /* ── Main view ── */
    #view-main { padding: 16px; gap: 14px; }

    .not-linkedin {
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      padding: 20px 0;
      line-height: 1.6;
    }

    .profile-preview {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
    }
    .profile-preview .name {
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .profile-preview .headline {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .scan-btn {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .scan-btn:hover { opacity: 0.85; }
    .scan-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Result ── */
    .result-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .verdict {
      font-family: var(--mono);
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 1px;
      text-align: center;
    }
    .verdict.keep, .verdict.accept { color: var(--green); }
    .verdict.remove, .verdict.decline { color: var(--red); }

    .reason {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
      text-align: center;
      border-top: 1px solid var(--border);
      padding-top: 8px;
    }

    .reset-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 11px;
      font-family: var(--sans);
      padding: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .reset-btn:hover { border-color: var(--muted); color: var(--text); }

    /* ── Loading ── */
    .loading-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
    }
    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    /* ── Error ── */
    .error-box {
      background: #1a0a0a;
      border: 1px solid #3a1a1a;
      border-radius: 8px;
      padding: 12px;
      font-size: 12px;
      color: #ff6b6b;
      line-height: 1.6;
    }

    /* ── Settings view ── */
    #view-settings { padding: 16px; gap: 14px; }

    .settings-header {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .back-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 2px 4px;
      border-radius: 4px;
      font-size: 16px;
      line-height: 1;
      transition: color 0.15s;
    }
    .back-btn:hover { color: var(--text); }
    .settings-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .field { display: flex; flex-direction: column; gap: 5px; }
    label {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .provider-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .provider-btn {
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: none;
      color: var(--muted);
      font-size: 12px;
      font-family: var(--mono);
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }
    .provider-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(79, 195, 247, 0.08);
    }

    input[type="text"], input[type="password"], textarea {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 12px;
      font-family: var(--sans);
      padding: 8px 10px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus,
    input[type="password"]:focus,
    textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 70px; line-height: 1.5; }
    ::placeholder { color: var(--muted); }

    .api-key-wrap { position: relative; }
    .api-key-wrap input { padding-right: 36px; font-family: var(--mono); font-size: 11px; }
    .toggle-key {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 13px;
      line-height: 1;
    }
    .toggle-key:hover { color: var(--text); }

    .save-btn {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .save-btn:hover { opacity: 0.85; }

    .save-status {
      font-size: 11px;
      color: var(--green);
      font-family: var(--mono);
      text-align: center;
      min-height: 16px;
    }

    .divider {
      height: 1px;
      background: var(--border);
    }
  </style>
</head>
<body>

  <!-- ── Main View ── -->
  <div id="view-main" class="view active">
    <header>
      <div class="logo">Link<span>Lens</span></div>
      <button class="settings-btn" id="open-settings" title="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <div style="padding: 16px; display: flex; flex-direction: column; gap: 14px;">
      <div id="profile-preview" class="profile-preview" style="display:none;">
        <div class="name" id="preview-name"></div>
        <div class="headline" id="preview-headline"></div>
      </div>

      <div id="not-linkedin" class="not-linkedin" style="display:none;">
        Navigate to a LinkedIn profile<br/>to use LinkLens.
      </div>

      <div id="no-settings" class="not-linkedin" style="display:none;">
        Add your API key in Settings<br/>to get started.
      </div>

      <div id="loading-box" class="loading-box" style="display:none;">
        <div class="spinner"></div>
        <div class="loading-text">Evaluating profile…</div>
      </div>

      <div id="error-box" class="error-box" style="display:none;"></div>

      <div id="result-box" class="result-box" style="display:none;">
        <div id="verdict" class="verdict"></div>
        <div id="reason" class="reason"></div>
        <button class="reset-btn" id="reset-btn">← Scan again</button>
      </div>

      <button class="scan-btn" id="scan-btn" style="display:none;">SCAN</button>
    </div>
  </div>

  <!-- ── Settings View ── -->
  <div id="view-settings" class="view">
    <header>
      <div class="settings-header">
        <button class="back-btn" id="back-btn">←</button>
        <div class="settings-title">Settings</div>
      </div>
    </header>

    <div style="padding: 16px; display: flex; flex-direction: column; gap: 14px;">
      <div class="field">
        <label>API Provider</label>
        <div class="provider-toggle">
          <button class="provider-btn active" data-provider="claude">Claude</button>
          <button class="provider-btn" data-provider="openai">OpenAI</button>
        </div>
      </div>

      <div class="field">
        <label>API Key</label>
        <div class="api-key-wrap">
          <input type="password" id="api-key" placeholder="sk-ant-… or sk-…" autocomplete="off" />
          <button class="toggle-key" id="toggle-key" title="Show/hide key">👁</button>
        </div>
      </div>

      <div class="divider"></div>

      <div class="field">
        <label>My Profile</label>
        <textarea id="my-profile" placeholder="E.g. I'm a senior ML engineer at a Series B startup. I focus on LLM infra and ML systems. I'm interested in AI, data, and early-stage tech."></textarea>
      </div>

      <div class="field">
        <label>Filter Criteria</label>
        <textarea id="filter-criteria" placeholder="E.g. Keep people in AI, data science, ML, or at companies relevant to my career. Remove recruiters, random connections, and people with no professional overlap."></textarea>
      </div>

      <button class="save-btn" id="save-btn">SAVE SETTINGS</button>
      <div class="save-status" id="save-status"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
